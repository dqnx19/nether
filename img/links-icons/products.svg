<svg width="64" height="64" viewBox="0 0 64 64"
     xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Products icon">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#111827"/>

  <!-- Box (product) -->
  <rect x="18" y="20" width="28" height="22" rx="3"
        fill="#FBBF24" stroke="#F59E0B" stroke-width="2"/>

  <!-- Box lid -->
  <rect x="18" y="18" width="28" height="6" rx="2"
        fill="#FCD34D" stroke="#F59E0B" stroke-width="2"/>

  <!-- Divider line on box -->
  <line x1="32" y1="20" x2="32" y2="42"
        stroke="#D97706" stroke-width="2"/>

  <!-- Small tag -->
  <rect x="40" y="14" width="10" height="12" rx="2"
        fill="#10B981" stroke="#059669" stroke-width="2"/>
  <circle cx="44" cy="18" r="1.5" fill="#ECFDF5"/>
</svg>
