<svg width="64" height="64" viewBox="0 0 64 64"
     xmlns="http://www.w3.org/2000/svg" role="img" aria-label="News icon">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1E293B"/>

  <!-- Newspaper body -->
  <rect x="14" y="18" width="36" height="28" rx="3"
        fill="#F1F5F9" stroke="#CBD5E1" stroke-width="2"/>

  <!-- Left title bar -->
  <rect x="18" y="22" width="16" height="4" rx="1"
        fill="#0EA5E9"/>

  <!-- Left text lines -->
  <rect x="18" y="30" width="20" height="3" rx="1" fill="#94A3B8"/>
  <rect x="18" y="36" width="18" height="3" rx="1" fill="#94A3B8"/>

  <!-- Right image placeholder -->
  <rect x="40" y="22" width="8" height="8" rx="1"
        fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5"/>

  <!-- Bottom text lines -->
  <rect x="40" y="34" width="8" height="3" rx="1" fill="#CBD5E1"/>
  <rect x="40" y="39" width="8" height="3" rx="1" fill="#CBD5E1"/>
</svg>
