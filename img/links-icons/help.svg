<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="helpGradient" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background bubble -->
  <rect x="8" y="8" width="48" height="48" rx="16"
        fill="url(#helpGradient)" filter="url(#softShadow)"/>

  <!-- Question mark (scaled with safe padding ~20%) -->
  <g transform="translate(32 32) scale(0.8) translate(-32 -32)">

    <path d="M32 44h0.01"
          stroke="white" stroke-width="4" stroke-linecap="round"/>

    <path d="M26.5 25.5c0-3.6 2.8-6.5 7-6.5s6.8 2.4 6.8 5.6c0 3.8-3.2 5.2-5.4 6.5-2 1.2-2.9 2.3-2.9 4.9"
          stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

    <circle cx="32" cy="48" r="2.2" fill="white"/>
  </g>
</svg>